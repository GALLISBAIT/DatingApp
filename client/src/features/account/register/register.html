<div class="card bg-base-100 mx-auto flex w-1/2 flex-col rounded-lg p-6 shadow-lg">
  <div class="card-title text-primary justify-center text-3xl">
    Sign Up
  </div>

  <div class="card-body w-full">
    <form [formGroup]="registerForm" class="flex w-full flex-col gap-4" (ngSubmit)="register()">

      <label class="floating-label">
        <span>Email</span>
        <input class="input w-full"
               formControlName="email"
               placeholder="Email">
      </label>

      <label class="floating-label text-left">
        <span>Display Name</span>
        <input class="input w-full"
               [class.input-error]="registerForm.controls['dispayName'].invalid 
                                 && registerForm.controls['displayName'].touched"
               formControlName="displayName"
               placeholder="Display Name">
        @if (registerForm.controls['dispayName'].invalid && registerForm.controls['displayName'].touched)
        {
                  <div class="validation-hint text-error text-xs">
                    Display Name is Required
                  </div>
        }
      </label>

      <label class="floating-label">
        <span>Password</span>
        <input type="password"
               class="input w-full"
               formControlName="password"
               placeholder="Password">
      </label>

      <label class="floating-label">
        <span>Confirm Password</span>
        <input type="password"
               class="input w-full"
               formControlName="confirmPassword"
               placeholder="Confirm Password">
      </label>

      <div class="flex items-center justify-end gap-3">

        <button (click)="cancel()" type="button" class="btn">Cancel</button>
       
        <button [disabled] ="!registerForm.valid"
                class="btn btn-primary"
                type="submit">
          Register
        </button>

      </div>
    </form>
  </div>

  <div class="mockup-code flex w-full flex-col items-start px-3 text-lg">
    <div> Form vaue: {{registerForm.value | json}}</div>
    <div> Form status: {{registerForm.status | json}}</div>
  </div>

</div>
