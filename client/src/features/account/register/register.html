<div class="card bg-base-100 mx-auto flex w-1/2 flex-col rounded-lg p-6 shadow-lg">
  <div class="card-title text-primary justify-center text-3xl">
    Sign Up
  </div>

  <div class="card-body w-full">
    <form [formGroup]="registerForm" class="flex w-full flex-col gap-4" (ngSubmit)="register()">

      <app-text-input label="Email" formControlName="email" />
      <app-text-input label="Display name" formControlName="displayName" />
      <app-text-input label="Password" formControlName="password" type="password" />
      <app-text-input label="Confirm Password" formControlName="confirmPassword" type="password" />

      <div class="flex items-center justify-end gap-3">

        <button (click)="cancel()" type="button" class="btn">Cancel</button>

        <button [disabled]="!registerForm.valid"
                class="btn btn-primary"
                type="submit">
          Register
        </button>

      </div>
    </form>
  </div>

  <div class="mockup-code flex w-full flex-col items-start px-3 text-lg">
    <div> Form vaue: {{registerForm.value | json}}</div>
    <div> Form status: {{registerForm.status | json}}</div>
  </div>

</div>
