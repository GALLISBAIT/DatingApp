<div class="min-h-100 flex w-full gap-6">
  <div class="flex w-2/3 items-center gap-4">
    <label (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave($event)"
           (drop)="onDrop($event)"
           [class.border-purple-600]="isDragging"
           [class.border-4]="isDragging"
           [class.bg-purple-100]="isDragging"
           for="dropzone-file"
           class="flex h-full w-full cursor-pointer
                    flex-col items-center justify-center rounded-lg
                    border-2 border-dashed border-gray-300">
      <p class="mb-2 text-lg">
        Click to Upload or Drag and Drop
      </p>
      <input type="file" id="dropzone-file" class="hidden" />
    </label>
  </div>

  @if (imageSrc()) {
      <div class="flex w-1/3 flex-col gap-3">

        <div class="flex justify-center rounded-lg border-2 border-gray-300">
          <img src="{{imageSrc()}}" alt="image preview"
               class="aspect-square rounded-lg object-cover" />
        </div>

        <div class="flex w-full gap-3">

          <button (click)="onCancel()" class="btn flex-1">Cancel</button>

          <button (click)="onUploadFile()"
                  class="btn btn-primary flex-1"
                  [disabled]="loading()">
              @if(loading()){
                  <span class="loading loading-spinner"></span>
              }
              Upload Image
          </button>

        </div>

      </div>
  }


</div>
